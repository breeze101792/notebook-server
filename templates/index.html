<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Notebook</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/vendor/highlight-styles/github-dark.css">
</head>
<body data-theme="dark">
  <div id="app">
    <header id="topbar">
      <div class="brand">📓 Notebook</div>
      <div class="search-wrap">
        <input id="search-input" type="search" placeholder="Search notebooks…  (Enter to run)">
        <label class="case-toggle" title="Case sensitive">
          <input type="checkbox" id="search-case"> Aa
        </label>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <button id="edit-toggle">Edit</button>
        <button id="save" class="primary" title="Save current file">Save</button>
      </div>
      <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
    </header>

    <main id="layout">
      <aside id="sidebar">
        <div class="panel-header">
          <span class="panel-title">Files</span>
          <button class="collapse-btn" id="sidebar-collapse" title="Collapse files (left arrow)">‹</button>
        </div>
        <div id="file-tree" class="tree"></div>
        <button class="expand-btn" id="sidebar-expand" title="Show files" hidden>›</button>
      </aside>

      <section id="editor-pane">
        <div id="tab-bar" class="tab-bar"></div>
        <div id="viewer" class="markdown-body"></div>
        <textarea id="raw-editor" hidden spellcheck="false"></textarea>
        <div id="search-results" class="search-results" hidden>
          <div class="search-results-header">
            <span id="search-summary"></span>
            <button id="search-close" title="Close search">×</button>
          </div>
          <ul id="search-list"></ul>
        </div>
      </section>

      <aside id="outline-pane">
        <div class="panel-header">
          <span class="panel-title">Outline</span>
          <button class="collapse-btn" id="outline-collapse" title="Collapse outline (right arrow)">›</button>
        </div>
        <div id="outline" class="outline"></div>
        <button class="expand-btn" id="outline-expand" title="Show outline" hidden>‹</button>
      </aside>
    </main>
  </div>

  <!-- Right-click context menu for the file tree -->
  <div id="context-menu" class="context-menu" hidden></div>

  <!-- Right-click context menu for file tabs -->
  <div id="tab-context-menu" class="context-menu" hidden></div>

  <!-- Settings modal. Opened by the ⚙ button in the top bar. -->
  <div id="settings-overlay" class="settings-overlay" hidden>
    <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button id="settings-close" class="icon-btn" title="Close" aria-label="Close">×</button>
      </div>
      <div class="settings-body">
        <section class="settings-section">
          <h3>Appearance</h3>
          <div class="settings-row">
            <label class="settings-label">Theme</label>
            <div class="settings-control theme-options">
              <label><input type="radio" name="theme" value="auto"> Auto</label>
              <label><input type="radio" name="theme" value="dark"> Dark</label>
              <label><input type="radio" name="theme" value="light"> Light</label>
            </div>
          </div>
        </section>

        <section class="settings-section">
          <h3>File watching</h3>
          <p class="settings-help">
            Get notified when files in your notebook are changed by another program
            (vim, a sync tool, a different browser tab, etc.).
          </p>
          <div class="settings-row">
            <span class="settings-label">Status</span>
            <span id="settings-watch-status" class="settings-value">—</span>
          </div>
          <div class="settings-row">
            <span class="settings-label"></span>
            <button id="settings-watch-toggle" class="settings-action">Enable</button>
          </div>
        </section>

        <section class="settings-section">
          <h3>About</h3>
          <div class="settings-row">
            <span class="settings-label">Data folder</span>
            <code id="settings-data-dir" class="settings-value settings-mono">…</code>
          </div>
          <div class="settings-row">
            <span class="settings-label">Config folder</span>
            <code id="settings-config-dir" class="settings-value settings-mono">…</code>
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- Vendored libs first (no CDN tags; works offline) -->
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/highlight.min.js"></script>
  <!-- App modules, in dependency order -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/viewer.js"></script>
  <script src="/static/js/watcher.js"></script>
  <script src="/static/js/outline.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/search.js"></script>
  <script src="/static/js/tabs.js"></script>
  <script src="/static/js/settings.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
